backend:
  # name: git-gateway
  name: github
  repo: mawmao/pikachu-dev
  branch: main

media_folder: "public/images"
public_folder: "/images"

site_url: https://glistening-entremet-e6fa08.netlify.app
display_url: https://glistening-entremet-e6fa08.netlify.app

collections:
  - name: "districts"
    label: "Districts"
    label_singular: "District"
    folder: "src/content/districts"
    create: true
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Slug (URL)", name: "slug", widget: "string", hint: "Use lowercase letters and hyphens, e.g. first-district" }
      - { label: "Tagline", name: "tagline", widget: "string" }
      - { label: "Short Description", name: "description", widget: "text" }
      - { label: "Hero Image", name: "heroImage", widget: "image" }

      - label: "Getting There"
        name: "gettingThere"
        widget: "list"
        required: false
        field: { label: "Route / Instruction", name: "route", widget: "string" }

      - label: "Quick Facts"
        name: "quickFacts"
        widget: "list"
        required: false
        fields:
          - label: "Icon"
            name: "icon"
            widget: "select"
            options:
              - { label: "Map Pin", value: "map-pin" }
              - { label: "Landmark", value: "landmark" }
              - { label: "Waves", value: "waves" }
              - { label: "Mountain", value: "mountain" }
              - { label: "Calendar", value: "calendar" }
              - { label: "Tree (Pine)", value: "tree-pine" }
          - { label: "Label", name: "label", widget: "string" }
          - { label: "Value", name: "value", widget: "string" }

      - label: "Gallery"
        name: "gallery"
        widget: "list"
        required: false
        fields:
          - { label: "Image", name: "src", widget: "image" }
          - { label: "Alt Text", name: "alt", widget: "string" }
          - { label: "Caption (optional)", name: "caption", widget: "string", required: false }

      - { label: "Order (1-5)", name: "order", widget: "number", default: 1 }
      - { label: "Full Content", name: "body", widget: "markdown" }

  - name: "municipalities"
    label: "Municipalities"
    label_singular: "Municipality"
    folder: "src/content/municipalities"
    create: true
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Slug (URL)", name: "slug", widget: "string", hint: "e.g. miagao, iloilo-city" }
      - label: "District"
        name: "district"
        widget: "relation"
        collection: "districts"
        search_fields: ["name"]
        value_field: "slug"
        display_fields: ["name"]
        required: true
      - { label: "Description", name: "description", widget: "text", required: false }
      - { label: "Image", name: "image", widget: "image", required: false }

  - name: "attractions"
    label: "Attractions"
    label_singular: "Attraction"
    folder: "src/content/attractions"
    create: true
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - label: "District"
        name: "district"
        widget: "relation"
        collection: "districts"
        search_fields: ["name"]
        value_field: "slug"
        display_fields: ["name"]
        required: true
      - label: "Municipality (optional)"
        name: "municipality"
        widget: "relation"
        collection: "municipalities"
        search_fields: ["name"]
        value_field: "slug"
        display_fields: ["name"]
        required: false

      - { label: "Description", name: "description", widget: "text" }

      - { label: "Image", name: "image", widget: "image" }

      - label: "Tags"
        name: "tags"
        widget: "list"
        field: { label: "Tag", name: "tag", widget: "string" }
        required: false

      - { label: "Featured on Homepage", name: "featured", widget: "boolean", default: false }
      - { label: "Details", name: "body", widget: "markdown", required: false }

  - name: "food"
    label: "Food & Flavors"
    label_singular: "Food Item"
    folder: "src/content/food"
    create: true
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - label: "District"
        name: "district"
        widget: "relation"
        collection: "districts"
        search_fields: ["name"]
        value_field: "slug"
        display_fields: ["name"]
        required: true
      - label: "Municipality (optional)"
        name: "municipality"
        widget: "relation"
        collection: "municipalities"
        search_fields: ["name"]
        value_field: "slug"
        display_fields: ["name"]
        required: false
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Image", name: "image", widget: "image" }
      - label: "Type"
        name: "type"
        widget: "select"
        options:
          - { label: "Dish", value: "dish" }
          - { label: "Snack", value: "snack" }
          - { label: "Drink", value: "drink" }
          - { label: "Restaurant", value: "restaurant" }
        default: "dish"
      - { label: "Details", name: "body", widget: "markdown", required: false }

  - name: "festivals"
    label: "Festivals"
    label_singular: "Festival"
    folder: "src/content/festivals"
    create: true
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Festival Name", name: "name", widget: "string" }
      - label: "District"
        name: "district"
        widget: "relation"
        collection: "districts"
        search_fields: ["name"]
        value_field: "slug"
        display_fields: ["name"]
        required: true
      - label: "Municipality (optional)"
        name: "municipality"
        widget: "relation"
        collection: "municipalities"
        search_fields: ["name"]
        value_field: "slug"
        display_fields: ["name"]
        required: false
      - { label: "Date", name: "date", widget: "string", hint: "e.g. 2025-01-26" }
      - { label: "Month (1-12)", name: "month", widget: "number" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Details", name: "body", widget: "markdown", required: false }

  - name: "events"
    label: "Events"
    label_singular: "Event"
    folder: "src/content/events"
    create: true
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Event Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "string", hint: "e.g. 2025-08-15" }
      - { label: "End Date (optional)", name: "endDate", widget: "string", required: false }
      - label: "District"
        name: "district"
        widget: "relation"
        collection: "districts"
        search_fields: ["name"]
        value_field: "slug"
        display_fields: ["name"]
        required: true
      - label: "Municipality (optional)"
        name: "municipality"
        widget: "relation"
        collection: "municipalities"
        search_fields: ["name"]
        value_field: "slug"
        display_fields: ["name"]
        required: false
      - { label: "Venue", name: "venue", widget: "string", required: false }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Image", name: "image", widget: "image" }
      - label: "Tags"
        name: "tags"
        widget: "list"
        field: { label: "Tag", name: "tag", widget: "string" }
        required: false
      - { label: "Featured on Homepage", name: "featured", widget: "boolean", default: false }
      - { label: "Full Details", name: "body", widget: "markdown", required: false }

backend:
  name: git-gateway
  branch: main

media_folder: "public/images"
public_folder: "/images"

site_url: https://glistening-entremet-e6fa08.netlify.app
display_url: https://glistening-entremet-e6fa08.netlify.app

collections:
  - name: "districts"
    label: "Districts"
    label_singular: "District"
    folder: "src/content/districts"
    create: true
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Slug (URL)", name: "slug", widget: "string", hint: "Use lowercase letters and hyphens, e.g. iloilo-city" }
      - { label: "Tagline", name: "tagline", widget: "string" }
      - { label: "Short Description", name: "description", widget: "text" }
      - { label: "Hero Image", name: "heroImage", widget: "image" }
      - label: "Gallery Images"
        name: "galleryImages"
        widget: "list"
        field: { label: "Image", name: "image", widget: "image" }
        required: false
      - { label: "Order (1-5)", name: "order", widget: "number", default: 1 }
      - { label: "Full Content", name: "body", widget: "markdown" }

  - name: "attractions"
    label: "Attractions"
    label_singular: "Attraction"
    folder: "src/content/attractions"
    create: true
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - label: "District"
        name: "district"
        widget: "select"
        options:
          - { label: "Iloilo City", value: "iloilo-city" }
          - { label: "Miagao", value: "miagao" }
          - { label: "Guimbal", value: "guimbal" }
          - { label: "Tigbauan", value: "tigbauan" }
          - { label: "Oton", value: "oton" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Image", name: "image", widget: "image" }
      - label: "Tags"
        name: "tags"
        widget: "list"
        field: { label: "Tag", name: "tag", widget: "string" }
        required: false
      - { label: "Featured on Homepage", name: "featured", widget: "boolean", default: false }
      - { label: "Details", name: "body", widget: "markdown", required: false }

  - name: "food"
    label: "Food & Flavors"
    label_singular: "Food Item"
    folder: "src/content/food"
    create: true
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - label: "District"
        name: "district"
        widget: "select"
        options:
          - { label: "Iloilo City", value: "iloilo-city" }
          - { label: "Miagao", value: "miagao" }
          - { label: "Guimbal", value: "guimbal" }
          - { label: "Tigbauan", value: "tigbauan" }
          - { label: "Oton", value: "oton" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Image", name: "image", widget: "image" }
      - label: "Type"
        name: "type"
        widget: "select"
        options:
          - { label: "Dish", value: "dish" }
          - { label: "Snack", value: "snack" }
          - { label: "Drink", value: "drink" }
          - { label: "Restaurant", value: "restaurant" }
        default: "dish"
      - { label: "Details", name: "body", widget: "markdown", required: false }

  - name: "festivals"
    label: "Festivals"
    label_singular: "Festival"
    folder: "src/content/festivals"
    create: true
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Festival Name", name: "name", widget: "string" }
      - label: "District"
        name: "district"
        widget: "select"
        options:
          - { label: "Iloilo City", value: "iloilo-city" }
          - { label: "Miagao", value: "miagao" }
          - { label: "Guimbal", value: "guimbal" }
          - { label: "Tigbauan", value: "tigbauan" }
          - { label: "Oton", value: "oton" }
      - { label: "Date", name: "date", widget: "string", hint: "e.g. 2025-01-26" }
      - { label: "Month (1-12)", name: "month", widget: "number" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Details", name: "body", widget: "markdown", required: false }

  - name: "events"
    label: "Events"
    label_singular: "Event"
    folder: "src/content/events"
    create: true
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Event Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "string", hint: "e.g. 2025-08-15" }
      - { label: "End Date (optional)", name: "endDate", widget: "string", required: false }
      - label: "District"
        name: "district"
        widget: "select"
        options:
          - { label: "Iloilo City", value: "iloilo-city" }
          - { label: "Miagao", value: "miagao" }
          - { label: "Guimbal", value: "guimbal" }
          - { label: "Tigbauan", value: "tigbauan" }
          - { label: "Oton", value: "oton" }
      - { label: "Venue", name: "venue", widget: "string", required: false }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Image", name: "image", widget: "image" }
      - label: "Tags"
        name: "tags"
        widget: "list"
        field: { label: "Tag", name: "tag", widget: "string" }
        required: false
      - { label: "Featured on Homepage", name: "featured", widget: "boolean", default: false }
      - { label: "Full Details", name: "body", widget: "markdown", required: false }
